<!DOCTYPE html>
<html lang="tr">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no" />
    <meta charset="UTF-8">
    <title>Kanser Farkındalık AR</title>

    <script src="https://aframe.io/releases/1.4.2/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

    <style>
        body { margin: 0; overflow: hidden; background-color: #000; }
        
        /* Başlangıç Ekranı - Video Kilidini Açmak İçin ŞART */
        #start-screen {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0, 0, 0, 0.8); z-index: 9999;
            display: flex; flex-direction: column; justify-content: center; align-items: center;
        }
        #start-button {
            padding: 15px 40px; font-size: 20px; font-weight: bold;
            background-color: #ff4757; color: white;
            border: none; border-radius: 30px; cursor: pointer;
            box-shadow: 0 4px 15px rgba(255, 71, 87, 0.4);
        }
        #start-button:active { transform: scale(0.95); }
        .hidden { display: none !important; }
    </style>
</head>
<body>

    <div id="start-screen">
        <button id="start-button">Deneyimi Başlat</button>
        <p style="color: white; margin-top: 15px; font-family: sans-serif;">Kamera izni verin ve görseli okutun</p>
    </div>

    <a-scene 
        mindar-image="imageTargetSrc: ./kanser/kanser.mind;" 
        color-space="sRGB" 
        renderer="colorManagement: true, physicallyCorrectLights" 
        vr-mode-ui="enabled: false" 
        device-orientation-permission-ui="enabled: false">
        
        <a-assets>
            <video id="kanserVideo" 
                   src="./kanser/kanser.mp4" 
                   preload="auto" 
                   loop="true" 
                   muted="true" 
                   playsinline 
                   webkit-playsinline 
                   crossorigin="anonymous">
            </video>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity id="target" mindar-image-target="targetIndex: 0">
            <a-video src="#kanserVideo" 
                     width="1" 
                     height="0.56" 
                     position="0 0 0" 
                     rotation="0 0 0">
            </a-video>
        </a-entity>
    </a-scene>

    <script>
        document.addEventListener("DOMContentLoaded", function() {
            const startButton = document.querySelector('#start-button');
            const startScreen = document.querySelector('#start-screen');
            const video = document.querySelector('#kanserVideo');
            const target = document.querySelector('#target');

            // 1. Butona basıldığında tarayıcının video oynatma engelini kaldır
            startButton.addEventListener('click', function() {
                startScreen.classList.add('hidden');
                
                // Videoyu sessizce oynatıp durdurarak tarayıcıya "kullanıcı izin verdi" mesajı gönderiyoruz
                video.play().then(() => {
                    video.pause();
                }).catch((error) => {
                    console.log("Video otomatik oynatma politikasına takıldı:", error);
                });
            });

            // 2. Kamera resmi bulduğunda videoyu oynat
            target.addEventListener("targetFound", event => {
                console.log("Görsel okundu, video başlıyor!");
                video.play();
            });

            // 3. Kamera resimden uzaklaştığında videoyu durdur
            target.addEventListener("targetLost", event => {
                console.log("Görsel kayboldu, video durduruldu.");
                video.pause();
            });
        });
    </script>
</body>
</html>
