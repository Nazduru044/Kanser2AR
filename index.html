<!DOCTYPE html>
<html lang="tr">
<head>
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta charset="UTF-8">
    <title>Kanser Farkındalık AR</title>

    <script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>

    <style>
        body { margin: 0; overflow: hidden; }
        
        /* Yükleme ve Tarama Ekranı Tasarımı */
        #ui-overlay {
            position: absolute; left: 0; right: 0; top: 0; bottom: 0;
            display: flex; align-items: center; justify-content: center;
            background: rgba(0,0,0,0.6); color: white;
            z-index: 100; font-family: sans-serif; text-align: center;
        }
        .hidden { display: none !important; }
        
        /* Tarama Çerçevesi */
        .scanner-box {
            width: 250px; height: 250px;
            border: 3px solid #fff; border-radius: 20px;
            position: relative; box-shadow: 0 0 20px rgba(255,255,255,0.5);
        }
    </style>
</head>
<body>

    <div id="ui-overlay">
        <div>
            <div class="scanner-box"></div>
            <p style="margin-top: 20px;">Lütfen kamerayı hedef görsele tutun...</p>
        </div>
    </div>

    <a-scene 
        mindar-image="imageTargetSrc: ./kanser/kanser.mind; uiScanning: #ui-overlay;" 
        color-space="sRGB" 
        renderer="colorManagement: true, physicallyCorrectLights" 
        vr-mode-ui="enabled: false" 
        device-orientation-permission-ui="enabled: false">
        
        <a-assets>
            <video id="kanserVideo" 
                   src="./kanser/kanser.mp4" 
                   preload="auto" 
                   loop="true" 
                   muted="true" 
                   playsinline 
                   webkit-playsinline 
                   crossorigin="anonymous">
            </video>
        </a-assets>

        <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

        <a-entity id="target" mindar-image-target="targetIndex: 0">
            <a-video src="#kanserVideo" 
                     width="1" 
                     height="0.56" 
                     position="0 0 0" 
                     rotation="0 0 0">
            </a-video>
        </a-entity>
    </a-scene>

    <script>
        const video = document.querySelector('#kanserVideo');
        const target = document.querySelector('#target');
        const overlay = document.querySelector('#ui-overlay');

        // Hedef görüntü algılandığında
        target.addEventListener("targetFound", () => {
            console.log("Görsel tanındı");
            video.play();
            overlay.classList.add("hidden");
        });

        // Hedef görüntü kaybolduğunda
        target.addEventListener("targetLost", () => {
            console.log("Görsel kayboldu");
            video.pause();
            overlay.classList.remove("hidden");
        });
    </script>
</body>
</html>
